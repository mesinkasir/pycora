{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-lg-10">
        <div class="post-detail">
            <header class="post-header">
                <h1 class="post-title">
				<a class="text-gradient text-decoration-none"
				href="{{ site.url }}/{{ page.slug }}">
				{{ page.title }}
				</a></h1>
                {% if page.description %}
                <p class=" lead mt-2">{{ page.description }}</p>
                {% endif %}
                {% if page.date %}
                <div class="post-meta mt-3">
                    <span>
                        <i class="far fa-calendar me-1"></i>
                        Updated {{ page.date.strftime('%B %d, %Y') }}
                    </span>
                </div>
                {% endif %}
            </header>
            {% if page.image %}
			<img class="img-fluid rounded-3 mt-3 mb-5 shadow-sm" alt="{{page.title}}"
			width="100%" height="100%" 
			src="{{page.image}}"/>
			{% endif %}
            <div class="post-content">
                {{ content|safe }}
            </div>
        </div>
    </div>
</div>
{% endblock %}
